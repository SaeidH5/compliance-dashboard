name: Continuous Regulatory Compliance Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Ingestion Dependencies
      run: |
        pip install gradio

    - name: Execute Headless Compliance Audit
      run: |
        python compliance_engine.py

    - name: Upload Audit Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: compliance-gap-report
        path: compliance_gap_analysis.json